apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: form-ingress
  namespace: circle-guard-master
  labels:
    app: circle-guard-form
    project: circle-guard
    environment: master
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - circle-guard-form.circleguard.edu
      secretName: circle-guard-form-tls
  rules:
    - host: circle-guard-form.circleguard.edu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: form-service
                port:
                  number: 8080
