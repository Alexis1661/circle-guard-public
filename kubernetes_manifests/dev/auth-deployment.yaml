apiVersion: apps/v1
kind: Deployment
metadata:
  name: circle-guard-auth
  namespace: circle-guard-dev
  labels:
    app: circle-guard-auth
    project: circle-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circle-guard-auth
  template:
    metadata:
      labels:
        app: circle-guard-auth
        version: latest
    spec:
      containers:
        - name: auth-service
          image: circle-guard-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8180
          env:
            # Shared config
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_PROFILES_ACTIVE
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
            - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
            # DB
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/circleguard_auth"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: DB_PASSWORD
            # LDAP
            - name: SPRING_LDAP_URLS
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_LDAP_URLS
            - name: SPRING_LDAP_BASE
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_LDAP_BASE
            - name: SPRING_LDAP_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_LDAP_USERNAME
            - name: SPRING_LDAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: LDAP_ADMIN_PASSWORD
            # JWT / QR
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: JWT_SECRET
            - name: QR_SECRET
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: QR_SECRET
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8180
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8180
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
