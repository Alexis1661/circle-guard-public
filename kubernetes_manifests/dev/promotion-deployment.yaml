apiVersion: apps/v1
kind: Deployment
metadata:
  name: circle-guard-promotion
  namespace: circle-guard-dev
  labels:
    app: circle-guard-promotion
    project: circle-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circle-guard-promotion
  template:
    metadata:
      labels:
        app: circle-guard-promotion
        version: latest
    spec:
      containers:
        - name: promotion-service
          image: circle-guard-promotion-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_PROFILES_ACTIVE
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
            - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
            # DB
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/circleguard_promotion"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: DB_PASSWORD
            # Neo4j
            - name: SPRING_NEO4J_URI
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_NEO4J_URI
            - name: SPRING_NEO4J_AUTHENTICATION_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_NEO4J_AUTHENTICATION_USERNAME
            - name: SPRING_NEO4J_AUTHENTICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: NEO4J_PASSWORD
            # Kafka
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS
            # Redis
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_DATA_REDIS_PORT
            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
