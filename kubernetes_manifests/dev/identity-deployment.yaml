apiVersion: apps/v1
kind: Deployment
metadata:
  name: circle-guard-identity
  namespace: circle-guard-dev
  labels:
    app: circle-guard-identity
    project: circle-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circle-guard-identity
  template:
    metadata:
      labels:
        app: circle-guard-identity
        version: latest
    spec:
      containers:
        - name: identity-service
          image: circle-guard-identity-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: SPRING_PROFILES_ACTIVE
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
            - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
              valueFrom:
                configMapKeyRef:
                  name: circle-guard-config
                  key: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
            # DB
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/circleguard_identity"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: DB_PASSWORD
            # JWT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: JWT_SECRET
            # Vault encryption keys
            - name: VAULT_SECRET
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: VAULT_SECRET
            - name: VAULT_SALT
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: VAULT_SALT
            - name: VAULT_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: circle-guard-secrets
                  key: VAULT_HASH_SALT
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
